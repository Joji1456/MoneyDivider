<!DOCTYPE html>
<html>
<head>
    <title>Expenses - Money Divider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">💰 Money Divider</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="groups.html">Groups</a></li>
            <li class="nav-item"><a class="nav-link active" href="expenses.html">Expenses</a></li>
            <li class="nav-item"><a class="nav-link" href="settlements.html">Settlements</a></li>
            <li class="nav-item"><a class="nav-link text-warning" href="index.html" onclick="localStorage.clear()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <h3>Add Expense</h3>
    <form id="expenseForm" class="mb-2">
        <input type="text" id="description" class="form-control mb-3" placeholder="Description (e.g. Food, Hotel)" required>
        <input type="number" id="amount" class="form-control mb-3" placeholder="Amount (₹)" step="0.01" required>
        <select id="groupId" class="form-control mb-3" required>
            <option value="">-- Select Group --</option>
        </select>
        <div id="splitPreview"></div>
        <button class="btn btn-success mt-2">Add Expense</button>
    </form>

    <hr>
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3>Expense History</h3>
        <span class="badge bg-dark fs-6">Grand Total: <span id="grandTotal">₹0.00</span></span>
    </div>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Description</th>
                <th>Total Amount</th>
                <th>Group</th>
                <th>Members</th>
                <th>Each Person Pays</th>
            </tr>
        </thead>
        <tbody id="expenseTable"></tbody>
    </table>
</div>

<script src="javascript/config.js"></script>
<script src="javascript/expense.js"></script>
</body>
</html>
