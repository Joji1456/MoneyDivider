<!DOCTYPE html>
<html>
<head>
    <title>Expenses - Money Divider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">💰 Money Divider</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="groups.html">Groups</a></li>
            <li class="nav-item"><a class="nav-link active" href="expenses.html">Expenses</a></li>
            <li class="nav-item"><a class="nav-link" href="settlements.html">Settlements</a></li>
            <li class="nav-item"><a class="nav-link text-warning" href="index.html" onclick="localStorage.clear()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <h3>Add Expense</h3>
    <form id="expenseForm" class="mb-4">
        <input type="text" id="description" class="form-control mb-3" placeholder="Description" required>
        <input type="number" id="amount" class="form-control mb-3" placeholder="Amount" required>
        <button class="btn btn-success">Add Expense</button>
    </form>

    <h3>Expense History</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Paid By</th>
                <th>Group</th>
            </tr>
        </thead>
        <tbody id="expenseTable"></tbody>
    </table>
</div>

<script src="javascript/config.js"></script>
<script src="javascript/expense.js"></script>
</body>
</html>
