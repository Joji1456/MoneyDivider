<!DOCTYPE html>
<html>
<head>
    <title>Money Divider - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .register-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            padding: 35px 30px 25px;
            text-align: center;
            color: white;
        }

        .card-header .logo { font-size: 3rem; margin-bottom: 8px; }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
        }

        .card-header p {
            opacity: 0.85;
            margin: 5px 0 0;
            font-size: 0.95rem;
        }

        .card-body {
            padding: 35px 30px;
            background: #fff;
        }

        .input-group-text {
            background: #f0fff8;
            border-right: none;
            color: #11998e;
        }

        .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0 !important;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(17,153,142,0.2);
            border-color: #11998e;
        }

        .input-group { margin-bottom: 18px; }

        .input-group .input-group-text {
            border-radius: 8px 0 0 8px;
        }

        .btn-register {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17,153,142,0.4);
            color: white;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: #aaa;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }

        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .login-link { text-align: center; }

        .login-link a {
            color: #11998e;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover { text-decoration: underline; }

        .password-hint {
            font-size: 0.78rem;
            color: #aaa;
            margin-top: -12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="card">
        <div class="card-header">
            <div class="logo">🎉</div>
            <h2>Create Account</h2>
            <p>Join Money Divider today</p>
        </div>
        <div class="card-body">
            <form id="registerForm">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-user"></i></span>
                    <input type="text" id="name" class="form-control" placeholder="Your full name" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="Your email address" required>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
                <p class="password-hint"><i class="fa fa-info-circle"></i> Use at least 6 characters</p>
                <button class="btn-register w-100 mt-1">
                    <i class="fa fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <div class="divider">or</div>

            <div class="login-link">
                Already have an account? <a href="index.html">Login here</a>
            </div>
        </div>
    </div>
</div>

<script src="javascript/config.js"></script>
<script src="javascript/register.js"></script>
</body>
</html>
