<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card p-4">

                <h2 class="text-center text-success">
                    Register
                </h2>

                <form id="registerForm">

                    <input
                        type="text"
                        id="name"
                        class="form-control mb-3"
                        placeholder="Name">

                    <input
                        type="email"
                        id="email"
                        class="form-control mb-3"
                        placeholder="Email">

                    <input
                        type="password"
                        id="password"
                        class="form-control mb-3"
                        placeholder="Password">

                    <button
                        class="btn btn-success w-100">
                        Register
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>
