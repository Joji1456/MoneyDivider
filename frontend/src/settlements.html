<!DOCTYPE html>
<html>
<head>
    <title>Settlements - Money Divider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">💰 Money Divider</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="groups.html">Groups</a></li>
            <li class="nav-item"><a class="nav-link" href="expenses.html">Expenses</a></li>
            <li class="nav-item"><a class="nav-link active" href="settlements.html">Settlements</a></li>
            <li class="nav-item"><a class="nav-link text-warning" href="index.html" onclick="localStorage.clear()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">

    <div class="row mb-2">
        <div class="col-md-6">
            <div class="card bg-warning text-dark p-3 text-center">
                <h5>⏳ Pending Settlements</h5>
                <h2 id="pendingCount">0</h2>
                <div id="pendingPeople" class="mt-2"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-success text-white p-3 text-center">
                <h5>✅ Paid Settlements</h5>
                <h2 id="paidCount">0</h2>
                <div id="paidPeople" class="mt-2"></div>
            </div>
        </div>
    </div>

    <h3 class="mt-4">Create Settlement</h3>
    <form id="settlementForm" class="mb-4">
        <input type="number" id="fromUser" class="form-control mb-3" placeholder="From User ID" required>
        <input type="number" id="toUser" class="form-control mb-3" placeholder="To User ID" required>
        <input type="number" id="amount" class="form-control mb-3" placeholder="Amount (₹)" step="0.01" required>
        <button class="btn btn-primary">Create Settlement</button>
    </form>

    <h3>All Settlements</h3>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>From</th>
                <th>To</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="settlementTable"></tbody>
    </table>
</div>

<script src="javascript/config.js"></script>
<script src="javascript/settlement.js"></script>
</body>
</html>
