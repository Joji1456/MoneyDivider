<!DOCTYPE html>
<html>
<head>
    <title>Groups - Money Divider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">💰 Money Divider</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="groups.html">Groups</a></li>
            <li class="nav-item"><a class="nav-link" href="expenses.html">Expenses</a></li>
            <li class="nav-item"><a class="nav-link" href="settlements.html">Settlements</a></li>
            <li class="nav-item"><a class="nav-link text-warning" href="index.html" onclick="localStorage.clear()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <h3>Create Group</h3>
    <form id="groupForm" class="mb-4">
        <input type="text" id="groupName" class="form-control mb-3" placeholder="Group Name (e.g. Food, Hotel, Trip)" required>

        <label class="form-label">Members (minimum 2 emails)</label>
        <div id="memberInputs">
            <input type="email" class="form-control mb-2 member-email" placeholder="Member 1 Email" required>
            <input type="email" class="form-control mb-2 member-email" placeholder="Member 2 Email" required>
        </div>
        <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addMemberInput()">+ Add More Members</button>
        <br>
        <button class="btn btn-primary">Create Group</button>
    </form>

    <h3>My Groups</h3>
    <ul class="list-group" id="groupList"></ul>
</div>

<script src="javascript/config.js"></script>
<script src="javascript/group.js"></script>
</body>
</html>
